name: Trigger Cursor Agent

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: string

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Call automation agent webhook
        env:
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          WEBHOOK_URL: ${{ secrets.AGENT_WEBHOOK_URL }}
          WEBHOOK_TOKEN: ${{ secrets.AGENT_WEBHOOK_TOKEN }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::error::AGENT_WEBHOOK_URL secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "$WEBHOOK_TOKEN" ]; then
            echo "::error::AGENT_WEBHOOK_TOKEN secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          payload=$(jq -n --arg num "$ISSUE_NUMBER" '{issue_number: $num}')
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: text/plain" \
            -H "Authorization: Bearer $WEBHOOK_TOKEN" \
            -d "$payload"
