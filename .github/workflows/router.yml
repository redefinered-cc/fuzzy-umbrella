name: Agent Router

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number (AgentPlan replay)'
        required: true
        type: string
  issues:
    # Humans change Project Status; Project automation mirrors status to labels used here.
    # Required mirror labels:
    # - Ready -> status:ready (triggers AgentPlan)
    # - In progress -> status:in_progress (triggers AgentDev)
    types: [opened, labeled]
  pull_request:
    types: [opened, edited, labeled, synchronize]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  agent-plan:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && (
        (github.event.action == 'labeled' && github.event.label.name == 'status:ready') ||
        (github.event.action == 'opened' && contains(toJson(github.event.issue.labels.*.name), 'status:ready'))
      ))
    runs-on: ubuntu-latest
    steps:
      - name: Call AgentPlan webhook
        env:
          ISSUE_NUMBER: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.issue_number || github.event.issue.number }}
          AGENT_WEBHOOK_URL_PLAN: ${{ secrets.AGENT_WEBHOOK_URL_PLAN }}
          AGENT_WEBHOOK_URL: ${{ secrets.AGENT_WEBHOOK_URL }}
          AGENT_WEBHOOK_TOKEN_PLAN: ${{ secrets.AGENT_WEBHOOK_TOKEN_PLAN }}
          AGENT_WEBHOOK_TOKEN: ${{ secrets.AGENT_WEBHOOK_TOKEN }}
        run: |
          set -eo pipefail
          WEBHOOK_URL="${AGENT_WEBHOOK_URL_PLAN:-$AGENT_WEBHOOK_URL}"
          WEBHOOK_TOKEN="${AGENT_WEBHOOK_TOKEN_PLAN:-$AGENT_WEBHOOK_TOKEN}"
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::error::Set AGENT_WEBHOOK_URL_PLAN or AGENT_WEBHOOK_URL (Actions secrets)."
            exit 1
          fi
          if [ -z "$WEBHOOK_TOKEN" ]; then
            echo "::error::Set AGENT_WEBHOOK_TOKEN_PLAN or AGENT_WEBHOOK_TOKEN (Actions secrets)."
            exit 1
          fi
          payload=$(jq -n --arg num "$ISSUE_NUMBER" '{issue_number: $num}')
          curl -fsS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: text/plain" \
            -H "Authorization: Bearer $WEBHOOK_TOKEN" \
            -d "$payload"

  agent-dev:
    if: >
      github.event_name == 'issues' &&
      ((github.event.action == 'labeled' && github.event.label.name == 'status:in_progress') ||
       (github.event.action == 'opened' && contains(toJson(github.event.issue.labels.*.name), 'status:in_progress')))
    runs-on: ubuntu-latest
    steps:
      - name: Call AgentDev webhook
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          WEBHOOK_URL: ${{ secrets.AGENT_WEBHOOK_URL_DEV }}
          WEBHOOK_TOKEN: ${{ secrets.AGENT_WEBHOOK_TOKEN_DEV }}
        run: |
          set -eo pipefail
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::error::AGENT_WEBHOOK_URL_DEV secret is not set."
            exit 1
          fi
          if [ -z "$WEBHOOK_TOKEN" ]; then
            echo "::error::AGENT_WEBHOOK_TOKEN_DEV secret is not set."
            exit 1
          fi
          payload=$(jq -n --arg num "$ISSUE_NUMBER" '{issue_number: $num}')
          curl -fsS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: text/plain" \
            -H "Authorization: Bearer $WEBHOOK_TOKEN" \
            -d "$payload"

  agent-review:
    if: >
      github.event_name == 'pull_request' &&
      github.event.action != 'synchronize' &&
      contains(toJson(github.event.pull_request.labels.*.name), 'agent:review')
    runs-on: ubuntu-latest
    steps:
      - name: Call AgentReview webhook
        env:
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
          WEBHOOK_URL: ${{ secrets.AGENT_WEBHOOK_URL_REVIEW }}
          WEBHOOK_TOKEN: ${{ secrets.AGENT_WEBHOOK_TOKEN_REVIEW }}
        run: |
          set -eo pipefail
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::error::AGENT_WEBHOOK_URL_REVIEW secret is not set."
            exit 1
          fi
          if [ -z "$WEBHOOK_TOKEN" ]; then
            echo "::error::AGENT_WEBHOOK_TOKEN_REVIEW secret is not set."
            exit 1
          fi
          payload=$(jq -n --arg num "$PULL_REQUEST_NUMBER" '{pull_request_number: $num}')
          curl -fsS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: text/plain" \
            -H "Authorization: Bearer $WEBHOOK_TOKEN" \
            -d "$payload"

  agent-test:
    if: >
      github.event_name == 'pull_request_review' &&
      github.event.action == 'submitted' &&
      github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Call AgentTest webhook
        env:
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
          WEBHOOK_URL: ${{ secrets.AGENT_WEBHOOK_URL_TEST }}
          WEBHOOK_TOKEN: ${{ secrets.AGENT_WEBHOOK_TOKEN_TEST }}
        run: |
          set -eo pipefail
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::error::AGENT_WEBHOOK_URL_TEST secret is not set."
            exit 1
          fi
          if [ -z "$WEBHOOK_TOKEN" ]; then
            echo "::error::AGENT_WEBHOOK_TOKEN_TEST secret is not set."
            exit 1
          fi
          payload=$(jq -n --arg num "$PULL_REQUEST_NUMBER" '{pull_request_number: $num}')
          curl -fsS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: text/plain" \
            -H "Authorization: Bearer $WEBHOOK_TOKEN" \
            -d "$payload"
